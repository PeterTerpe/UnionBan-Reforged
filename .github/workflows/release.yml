name: Build and upload release assets

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            package: meshban-linux-amd64
            binary: meshban
            archive: tar.gz

          - goos: linux
            goarch: arm64
            package: meshban-linux-arm64
            binary: meshban
            archive: tar.gz

          - goos: windows
            goarch: amd64
            package: meshban-windows-amd64
            binary: meshban.exe
            archive: zip

          - goos: windows
            goarch: arm64
            package: meshban-windows-arm64
            binary: meshban.exe
            archive: zip

          - goos: darwin
            goarch: amd64
            package: meshban-darwin-amd64
            binary: meshban
            archive: tar.gz

          - goos: darwin
            goarch: arm64
            package: meshban-darwin-arm64
            binary: meshban
            archive: tar.gz

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p "dist/${{ matrix.package }}"

          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/${{ matrix.package }}/${{ matrix.binary }}" \
            .

          cp README.md "dist/${{ matrix.package }}/"
          cp LICENSE "dist/${{ matrix.package }}/"
          cp example_config.yaml "dist/${{ matrix.package }}/"

      - name: Package
        run: |
          cd dist

          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "${{ matrix.package }}.zip" "${{ matrix.package }}"
          else
            tar -czf "${{ matrix.package }}.tar.gz" "${{ matrix.package }}"
          fi

      - name: Upload package to current release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            ASSET="dist/${{ matrix.package }}.zip"
          else
            ASSET="dist/${{ matrix.package }}.tar.gz"
          fi

          gh release upload "${{ github.event.release.tag_name }}" "$ASSET" --clobber

  upload-config:
    name: Upload standalone example_config.yaml
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Upload example_config.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" example_config.yaml --clobber
