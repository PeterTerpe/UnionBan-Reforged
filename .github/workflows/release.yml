name: Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: meshban-linux-amd64
            archive: tar.gz

          - goos: linux
            goarch: arm64
            output: meshban-linux-arm64
            archive: tar.gz

          - goos: windows
            goarch: amd64
            output: meshban-windows-amd64.exe
            archive: zip

          - goos: darwin
            goarch: amd64
            output: meshban-darwin-amd64
            archive: tar.gz

          - goos: darwin
            goarch: arm64
            output: meshban-darwin-arm64
            archive: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p "dist/${{ matrix.output }}"

          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.output }}/${{ matrix.output }}" .

          cp README.md "dist/${{ matrix.output }}/"
          cp LICENSE "dist/${{ matrix.output }}/"
          cp example_config.yaml "dist/${{ matrix.output }}/"

      - name: Package binary
        run: |
          cd dist

          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "${{ matrix.output }}.zip" "${{ matrix.output }}"
          else
            tar -czf "${{ matrix.output }}.tar.gz" "${{ matrix.output }}"
          fi

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            gh release upload "${{ github.event.release.tag_name }}" \
              "dist/${{ matrix.output }}.zip" \
              --clobber
          else
            gh release upload "${{ github.event.release.tag_name }}" \
              "dist/${{ matrix.output }}.tar.gz" \
              --clobber
          fi
