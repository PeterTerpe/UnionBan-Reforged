{{define "content"}}
<div class="card">
    <h2>WebUI Login</h2>

    {{if .ErrorMessage}}
        <p class="result-error">{{.ErrorMessage}}</p>
    {{end}}

    <p>
        Remote access requires the WebUI token from your MeshBan <code>.env</code> file.
        Localhost access does not require login.
    </p>

    <form method="post" action="/ui/login">
        <input type="hidden" name="next" value="{{.LoginNext}}">

        <label>WebUI Token</label>
        <input class="input" name="token" type="password" autocomplete="current-password" placeholder="Paste MESHBAN_WEB_TOKEN">

        <button class="button" type="submit">Login</button>
    </form>
</div>
{{end}}
